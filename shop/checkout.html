<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="结算 — Lhasa Sa 商城" />
  <link rel="canonical" href="https://lhasasa-tashidelek.com/shop/checkout.html" />
  <title>结算 · Lhasa Sa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/shop.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a2744'/%3E%3Cpath d='M8 20c4-8 12-8 16 0' fill='none' stroke='%23c9a962' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <header class="site-header">
    <a class="logo" href="/">Lhasa Sa</a>
    <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="打开菜单">
      <span></span><span></span><span></span>
    </button>
    <nav id="site-nav" class="site-nav" aria-label="主导航">
      <a href="/">首页</a>
      <a href="/shop/">商城</a>
      <a href="/#contact">联系</a>
    </nav>
  </header>

  <main class="checkout-layout">
    <h1>订单结算</h1>
    <p class="checkout-lead">请核对商品与金额，填写收货信息。当前为演示流程，提交后不会扣款。</p>

    <section class="checkout-card" aria-labelledby="sum-h">
      <h2 id="sum-h">订单明细</h2>
      <div id="order-summary"></div>
      <p style="margin:1rem 0 0;font-size:1.05rem;display:flex;justify-content:space-between;align-items:baseline">
        <span>应付合计</span>
        <strong id="order-total" style="font-family:var(--serif-en);font-size:1.5rem;color:var(--gold)">¥0</strong>
      </p>
    </section>

    <section class="checkout-card" aria-labelledby="ship-h">
      <h2 id="ship-h">收货信息</h2>
      <form id="checkout-form" class="form-grid">
        <div class="form-field">
          <label for="name">收货人</label>
          <input id="name" name="name" type="text" required autocomplete="name" placeholder="姓名" />
        </div>
        <div class="form-field">
          <label for="phone">手机号</label>
          <input id="phone" name="phone" type="tel" required autocomplete="tel" placeholder="11 位手机号" />
        </div>
        <div class="form-field">
          <label for="address">详细地址</label>
          <input id="address" name="address" type="text" autocomplete="street-address" placeholder="省市区 + 街道门牌" />
        </div>
        <div class="form-field">
          <label for="note">备注</label>
          <textarea id="note" name="note" placeholder="口味、送达时间等（选填）"></textarea>
        </div>
        <button type="submit" class="submit-order">提交订单（演示）</button>
      </form>
      <p class="notice-box">
        正式上线时，可在此接入微信支付、支付宝、Stripe 或 Shopify Checkout；并连接库存与物流 API。OpenClaw 适合在本地生成/维护代码与运营脚本，支付密钥须放在服务端环境变量，切勿写进前端仓库。
      </p>
    </section>

    <a class="back-shop" href="/shop/">← 返回商城</a>
  </main>

  <footer class="site-footer">
    <p>© <span id="y"></span> Lhasa Sa · Tashi Delek</p>
  </footer>

  <script src="/js/shop.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/checkout-page.js"></script>
</body>
</html>
